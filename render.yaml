services:
  - type: web
    name: meatlens-backend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/analysis/health
    buildFilter:
      paths:
        - backend/**
        - package.json
        - package-lock.json
        - .npmrc
        - scripts/run-build.mjs
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/meatlens-uploads
