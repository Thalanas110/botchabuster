name: Keep Render service awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS -o /dev/null "https://meatlens-backend.onrender.com/api/analysis/health" || true
